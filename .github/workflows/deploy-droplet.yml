name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Pull latest code
            cd ~/obeeoma_project
            git pull origin main

            # Rebuild and restart Docker containers
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d

            # Run Django commands
            docker-compose exec -T django_backend python manage.py migrate --noinput
            docker-compose exec -T django_backend python manage.py collectstatic --noinput

            # Health check
            sleep 10
            if curl -f http://127.0.0.1:8000/api/v1/; then
              echo "✅ Backend deployed successfully!"
            else
              echo "❌ Backend deployment failed"
              docker-compose logs django_backend --tail 20
              exit 1
            fi

            echo "✅ Deployment complete!"
            docker-compose ps
