services:
  frontend:
    build:
      # This tells Docker: "Go into the Obeeoma folder and look for the Dockerfile"
      context: ./Obeeoma
      dockerfile: Dockerfile
    container_name: obeeoma_frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  backend:
    build: 
      context: .
      cache_from:
        - backend:latest
    image: backend:latest
    container_name: django_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 api.wsgi:application

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped